name: Build and Release Exact LM-Studio Version

on:
  schedule:
    - cron: '0 0 * * *' # Triggers automatically every night at midnight UTC
  workflow_dispatch:      # Grants you a manual "Run Workflow" button in the GitHub UI

jobs:
  check-and-publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code Repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}

      - name: Extract Live LM-Studio Version
        id: version_check
        run: |
          # Pull the installer script, isolate the version line, and extract the digits
          VERSION=$(curl -fsSL https://lmstudio.ai/install.sh | grep -oE "version=[0-9]+\.[0-9]+\.[0-9]+" | head -n 1 | cut -d'=' -f2)
          echo "Extracted version is: $VERSION"
          # Save it to the GitHub environment output map
          echo "LMS_VER=$VERSION" >> $GITHUB_OUTPUT

      - name: Build and Push Multi-Tagged Images
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          # This builds your image once but pushes it under two distinct tags
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/lm-studio-headless:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/lm-studio-headless:${{ steps.version_check.outputs.LMS_VER }}
          # Enables caching to make subsequent daily builds incredibly fast
          cache-from: type=gha
          cache-to: type=gha,mode=max