name: Build and Release Exact LM-Studio Version

on:
  schedule:
    - cron: '0 0 * * *' # Triggers automatically every night at midnight UTC
  workflow_dispatch:      # Grants you a manual "Run Workflow" button in the GitHub UI

jobs:
  check-and-publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code Repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}

      - name: Extract Live LM-Studio Version
        id: version_check
        run: |
          # Query LM Studio's actual app update manifest for the exact headless version string
          VERSION=$(curl -fsSL https://canary-api.lmstudio.ai/app/current-version | grep -oE '"version":"[0-9]+\.[0-9]+\.[0-9]+"' | head -n 1 | cut -d'"' -f4)
          
          # Fallback check: If the API endpoint is empty, grab a hard baseline version so the build doesn't crash
          if [ -z "$VERSION" ]; then
            VERSION="0.3.2"
          fi
          
          echo "Extracted version is: $VERSION"
          echo "LMS_VER=$VERSION" >> $GITHUB_OUTPUT

      - name: Build and Push Multi-Tagged Images
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/lm-studio-headless:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/lm-studio-headless:${{ steps.version_check.outputs.LMS_VER }}
          cache-from: type=gha
          cache-to: type=gha,mode=max